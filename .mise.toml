[tools]
node = "25.9.0"
pnpm = "10.30.3"

[tasks.install]
description = "Install workspace dependencies"
run = "pnpm install"

[tasks.dev]
description = "Start the server development process"
run = "pnpm dev"

[tasks.server]
description = "Start apps/server"
run = "pnpm dev:server"

[tasks.web]
description = "Start apps/web"
run = "pnpm dev:web"

[tasks.worker]
description = "Start apps/worker"
run = "pnpm dev:worker"

[tasks."server:portless"]
description = "Start apps/server through Portless at http://api.excalidraw-agent.localhost:1355"
run = "pnpm dlx portless proxy start --port 1355 --no-tls && pnpm dlx portless api.excalidraw-agent pnpm dev:server"

[tasks."web:portless"]
description = "Start apps/web through Portless at http://excalidraw-agent.localhost:1355"
run = "pnpm dlx portless proxy start --port 1355 --no-tls && VITE_SERVER_URL=http://api.excalidraw-agent.localhost:1355 VITE_COLLAB_URL=ws://api.excalidraw-agent.localhost:1355/collab pnpm dlx portless excalidraw-agent pnpm dev:web"

[tasks.typecheck]
description = "Typecheck all workspaces"
run = "pnpm typecheck"

[tasks.test]
description = "Run all tests"
run = "pnpm test"
